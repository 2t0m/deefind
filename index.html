<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-title" content="Deefind">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="manifest" href="/manifest.json">

    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23667eea'/%3E%3Cstop offset='100%25' style='stop-color:%23764ba2'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='180' height='180' rx='40' fill='url(%23g)'/%3E%3Cpath d='M110 50c8 0 15 7 15 15v50c0 8-7 15-15 15s-15-7-15-15V65c0-8 7-15 15-15zm-40 20c8 0 15 7 15 15v30c0 8-7 15-15 15s-15-7-15-15V85c0-8 7-15 15-15z' fill='white'/%3E%3Ccircle cx='110' cy='50' r='8' fill='white'/%3E%3Ccircle cx='70' cy='70' r='8' fill='white'/%3E%3C/svg%3E">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Performance hints -->
    <link rel="preconnect" href="https://api.deezer.com" crossorigin>
    <link rel="dns-prefetch" href="//api.deezer.com">
    
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="container">
        <div class="header-container">
            <h1>🎵 Deefind</h1>
            <button class="history-toggle" id="history-toggle" title="History" aria-label="Open history">
                <i class="fas fa-bars" aria-hidden="true"></i>
            </button>
        </div>
        
        <div class="search-container">
            <div class="search-wrapper">
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="A song, an artist, an album..."
                    autocomplete="off"
                >
                <button class="clear-btn" id="clear-btn" aria-label="Clear">&times;</button>
            </div>
        </div>

        <div class="tabs-container">
            <button class="tab active" data-tab="tracks"><i class="fas fa-music"></i></button>
            <button class="tab" data-tab="albums"><i class="fas fa-compact-disc"></i></button>
            <button class="tab" data-tab="playlists"><i class="fas fa-list"></i></button>
        </div>

        <div id="results"></div>
    </div>

    <div id="notification" class="notification"></div>

    <!-- Modal pour afficher les tracks -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-info">
                    <img id="modal-cover" class="modal-cover" src="" alt="">
                    <div>
                        <div class="modal-title" id="modal-title"></div>
                        <div class="modal-artist" id="modal-artist"></div>
                    </div>
                </div>
            </div>
            <div class="modal-body" id="modal-body">
                <div id="modal-track-list">
                    <div style="text-align: center; padding: 20px;">Loading tracks...</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-send" id="modal-download">
                    <i class="fas fa-download"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- History Panel -->
    <div class="history-panel" id="history-panel">
        <div class="history-header">
            <div class="history-title">Download History</div>
            <button class="history-close" id="history-close">&times;</button>
        </div>
        <button class="history-clear" id="history-clear">Clear History</button>
        <div id="history-list"></div>
    </div>

    <script src="/app.js" defer></script>
</body>
</html>
